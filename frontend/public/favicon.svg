<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white" rx="16"/>
  <!-- V letter -->
  <polygon points="8,18 24,18 50,68 76,18 92,18 50,88" fill="#1a4eb8"/>
  <!-- Rocket body (tilted, launching from V center) -->
  <ellipse cx="65" cy="26" rx="9" ry="17" transform="rotate(-40 65 26)" fill="#1a4eb8"/>
  <!-- Rocket nose cone -->
  <polygon points="74,11 81,4 77,19" fill="#1a4eb8"/>
  <!-- Rocket window -->
  <circle cx="66" cy="23" r="3.5" fill="white"/>
  <!-- Rocket fin left -->
  <polygon points="53,37 47,45 57,40" fill="#1a4eb8"/>
  <!-- Rocket fin right -->
  <polygon points="71,38 78,44 70,42" fill="#1a4eb8"/>
  <!-- Exhaust clouds -->
  <circle cx="53" cy="50" r="5.5" fill="#1a4eb8"/>
  <circle cx="60" cy="53" r="5" fill="#1a4eb8"/>
  <circle cx="47" cy="54" r="4.5" fill="#1a4eb8"/>
  <circle cx="54" cy="59" r="4.5" fill="#1a4eb8"/>
</svg>
